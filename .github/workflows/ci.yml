name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: biashara_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: biashara_os_test
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: api/.ruby-version
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: api/Gemfile

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Scan for security vulnerabilities
        run: bin/brakeman --no-pager

      - name: Lint
        run: bin/rubocop -f github

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api/v1

  docker:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t biashara-api ./api

      - name: Build web image
        run: docker build --build-arg VITE_API_URL=http://localhost:3000/api/v1 -t biashara-web ./web
